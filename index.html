<script src="https://www.youtube.com/iframe_api"></script>
<script>
(function(){
  var player;
  var cover = document.getElementById('ezpkVideoCover');

  function hideCover(){
    if (cover) cover.classList.add('is-hidden');
  }

  window.onYouTubeIframeAPIReady = function(){
    player = new YT.Player('ezpkYouTubePlayer', {
      videoId: 'mgoCrdaiI6E',
      playerVars: {
        autoplay: 1,
        mute: 1,
        controls: 0,
        loop: 1,
        playlist: 'mgoCrdaiI6E',
        playsinline: 1,
        rel: 0,
        disablekb: 1,
        fs: 0,
        iv_load_policy: 3
      },
      events: {
        onReady: function(event){
          event.target.mute();
          event.target.playVideo();
        },
        onStateChange: function(event){
          if (event.data === YT.PlayerState.PLAYING) hideCover();
          if (event.data === YT.PlayerState.ENDED) {
            event.target.seekTo(0);
            event.target.playVideo();
          }
        }
      }
    });
  };

  if (cover) {
    cover.addEventListener('click', function(){
      if (player && typeof player.playVideo === 'function') {
        player.mute();
        player.playVideo();
      }
    });
  }
})();
</script></body></html>
