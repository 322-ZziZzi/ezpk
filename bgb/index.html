<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
  <meta name="theme-color" content="#05070b">
  <title>EZPK BGB</title>
  <link rel="stylesheet" href="../style.css?v=370">
  <link rel="stylesheet" href="bgb.css?v=370">
</head>
<body>
<header>
  <a href="../" class="brand">★ <span><b>322 EZPK</b><small>WAR PORTAL</small></span></a>
  <button id="menuBtn" aria-label="Menu">☰</button>
  <nav id="nav">
    <a href="../#schedule" data-k="schedule"></a>
    <a href="../#lineup" data-k="lineup"></a>
    <a href="../#map" data-k="map"></a>
    <a href="../#strategy" data-k="strategy"></a>
    <a href="../#orders" data-k="orders"></a>
    <a href="../#season7" data-k="season7"></a>
    <a href="../members/" data-k="members"></a>
    <a href="./" class="active">BGB</a>
    <a href="../request/" data-k="request"></a>
  </nav>
  <div class="lang"><button id="langBtn"><span id="flag"></span><span id="lname"></span> ▾</button><div id="langMenu" hidden><button data-l="ko">🇰🇷 한국어</button><button data-l="en">🇺🇸 English</button><button data-l="pt">🇧🇷 Português</button><button data-l="vi">🇻🇳 Tiếng Việt</button><button data-l="ar">🇸🇦 العربية</button><button data-l="zh-tw">🇹🇼 繁體中文</button></div></div>
</header>
<main class="bgb-main">
  <section class="bgb-hero"><span class="eyebrow">SERVER 322 · EZPK ALLIANCE</span><h1>BGB</h1><p id="lead"></p></section>
  <section class="map-section"><div class="section-head"><span>TACTICAL MAP</span><h2 id="mapTitle"></h2><p id="mapHelp"></p></div><div class="map-frame"><div class="stage"><img src="../assets/bgb-map.webp?v=220" alt="BGB tactical map"></div></div><p class="hint" id="pinch"></p></section>
  <section class="location-section alt"><div class="section-head"><span>LOCATION INFORMATION</span><h2 id="locationTitle"></h2><p id="locationLead"></p></div><div id="locationLegend" class="location-legend"></div></section>
  <section class="assignment-section">
    <div class="section-head"><span>BGB TEAMS</span><h2 id="assignmentTitle"></h2><p id="assignmentLead"></p></div>
    <div id="teamTabs" class="team-tabs"><button data-team="A" class="active">A TEAM</button><button data-team="B">B TEAM</button></div>
    <div class="download-row"><button id="teamLineupViewBtn" class="team-lineup-view" type="button"></button></div>
    <div class="final-lineup-card"><div class="final-lineup-head"><span id="teamTitle">A TEAM</span><h3 id="finalLineupTitle"></h3></div><div id="finalLineup" class="final-lineup"></div></div>
    <div id="locationCards" class="location-cards"></div>
    <div class="bgb-updated"><span id="updatedLabel"></span><strong id="updatedDate">-</strong></div>
  </section>
</main>
<footer><b>322 EZPK ALLIANCE</b><span id="footerText"></span></footer>
<div id="imagePreviewModal" class="image-preview-modal" hidden>
  <div class="image-preview-backdrop" data-preview-close></div>
  <section class="image-preview-panel" role="dialog" aria-modal="true" aria-labelledby="previewTitle">
    <div class="image-preview-head">
      <div>
        <span class="preview-kicker">SERVER 322 · EZPK</span>
        <h2 id="previewTitle"></h2>
      </div>
      <button id="previewCloseBtn" class="preview-close" type="button" aria-label="Close">×</button>
    </div>
    <p id="previewGuide" class="preview-guide"></p>
    <div class="preview-image-wrap"><img id="previewImage" alt="BGB team list preview"></div>
    <div class="preview-actions">
      <button id="previewDoneBtn" class="preview-primary preview-primary-full" type="button"></button>
    </div>
  </section>
</div>

<script src="bgb.js?v=370"></script>
</body>
</html>
