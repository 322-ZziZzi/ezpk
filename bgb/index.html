<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
  <meta name="theme-color" content="#05070b">
  <title>EZPK BGB</title>
  <link rel="stylesheet" href="../style.css?v=1770">
  <link rel="stylesheet" href="bgb.css?v=1770">
  <link rel="stylesheet" href="../common-heading.css?v=1020">
</head>
<body>
<header class="site-header" data-shared-header data-base=".." data-home-href="../#home" data-active-menu="bgb"></header><script src="../shared-header.js?v=1530"></script>
<main class="bgb-main">
  <section id="bgbLock" class="member-gate-wrap" hidden>
    <div class="member-gate-card">
      <div class="member-gate-icon" aria-hidden="true">🔒</div>
      <span id="bgbLockSection" class="member-gate-section"></span>
      <h2 id="lockTitle" class="member-gate-title"></h2>
      <p id="lockLead" class="member-gate-description"></p>
      <form id="bgbLockForm" class="member-gate-form">
        <label for="bgbPassword" id="passwordLabel"></label>
        <div class="member-gate-row">
          <input id="bgbPassword" type="password" autocomplete="current-password" required>
          <button id="bgbUnlockBtn" type="submit"></button>
        </div>
        <p id="bgbLockError" class="member-gate-error" role="alert"></p>
      </form>
    </div>
  </section>

  <div id="bgbProtected" hidden>
    <div class="alliance-logout-row" data-alliance-logout-row hidden>
      <button type="button" class="alliance-logout-btn" data-alliance-logout></button>
    </div>
    <section class="map-section"><div class="section-head"><span id="mapEyebrow"></span><h2 id="mapTitle"></h2><p id="mapHelp"></p></div><div class="map-frame"><div class="stage"><img src="./bgb-map.webp?v=920" alt="BGB tactical map"></div></div><p class="hint" id="pinch"></p></section>
    <section class="location-section alt"><div class="section-head"><span id="locationEyebrow"></span><h2 id="locationTitle"></h2><p id="locationLead"></p></div><div id="locationLegend" class="location-legend"></div></section>
    <section class="assignment-section">
      <div class="section-head"><span id="assignmentEyebrow"></span><h2 id="assignmentTitle"></h2><p id="assignmentLead"></p></div>
      <div id="teamTabs" class="team-tabs"><button data-team="A" class="active">A TEAM</button><button data-team="B">B TEAM</button></div>
      <div class="download-row"><button id="teamLineupViewBtn" class="team-lineup-view" type="button"></button></div>
      <div class="final-lineup-card"><div class="final-lineup-head"><span id="teamTitle">A TEAM</span><h3 id="finalLineupTitle"></h3></div><div id="finalLineup" class="final-lineup"></div></div>
      <div id="locationCards" class="location-cards"></div>
      <div class="bgb-updated"><span id="updatedLabel"></span><strong id="updatedDate">-</strong></div>
    </section>
  </div>
</main>
<footer><b>322 EZPK ALLIANCE</b><span id="footerText"></span></footer>
<div id="imagePreviewModal" class="image-preview-modal" hidden>
  <div class="image-preview-backdrop" data-preview-close></div>
  <section class="image-preview-panel" role="dialog" aria-modal="true" aria-labelledby="previewTitle">
    <div class="image-preview-head">
      <div>
        <span class="preview-kicker">SERVER 322 · EZPK</span>
        <h2 id="previewTitle"></h2>
      </div>
      <button id="previewCloseBtn" class="preview-close" type="button" aria-label="Close">×</button>
    </div>
    <p id="previewGuide" class="preview-guide"></p>
    <div class="preview-image-wrap"><img id="previewImage" alt="BGB team list preview"></div>
    <div class="preview-actions">
      <button id="previewDoneBtn" class="preview-primary preview-primary-full" type="button"></button>
    </div>
  </section>
</div>

<script src="bgb.js?v=1770"></script>
</body>
</html>
