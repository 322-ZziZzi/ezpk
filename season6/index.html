<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
  <meta name="theme-color" content="#05070b">
  <title>Season 6 | 322 EZPK Alliance</title>
  <link rel="stylesheet" href="../style.css?v=1740">
  <link rel="stylesheet" href="season6.css?v=1740">
  <link rel="stylesheet" href="../common-heading.css?v=1610">
</head>
<body>
<header class="site-header" data-shared-header data-base=".." data-home-href="../#home" data-active-menu="seasonUpcoming"></header>
<script src="../shared-header.js?v=1610"></script>
<main>
  <section id="season6Lock" class="member-gate-wrap">
    <div class="member-gate-card">
      <div class="member-gate-icon" aria-hidden="true">🔒</div>
      <span id="season6LockSection" class="member-gate-section"></span>
      <h1 id="season6LockTitle" class="member-gate-title"></h1>
      <p id="season6LockLead" class="member-gate-description"></p>
      <form id="season6LockForm" class="member-gate-form">
        <label for="season6Password" id="season6PasswordLabel"></label>
        <div class="member-gate-row">
          <input id="season6Password" type="password" autocomplete="current-password" required>
          <button id="season6UnlockBtn" type="submit"></button>
        </div>
        <p id="season6LockError" class="member-gate-error" role="alert"></p>
      </form>
    </div>
  </section>
  <div id="season6Protected" hidden>
  <section class="season6-page">
    <section id="latestView" class="season6-content-section">
      <div class="section-title-block">
        <span>SEASON 6</span>
        <h2 id="latestInfoTitle">LATEST INFO</h2>
        <p id="latestInfoLead"></p>
      </div>
      <div class="frame seasonframe"><div class="stage"><img id="season6Img" alt="Season 6 latest information"></div></div>
      <div class="frame seasonframe latest-rules-frame"><div class="stage"><img id="season6RulesImg" alt="Season 6 rules guide"></div></div>
      <p class="hint" data-k="pinch"></p>
    </section>
    <section id="buildingGuideView" class="season6-content-section building-guide-section">
      <div class="section-title-block">
        <span>SEASON 6</span>
        <h2 id="buildingGuideTitle">SEASON BUILDING GUIDE</h2>
        <p id="buildingGuideLead"></p>
      </div>
      <div class="frame seasonframe"><div class="stage"><img id="seasonBuildingImg" alt="Season 6 building guide"></div></div>
      <p class="hint" data-k="pinch"></p>
    </section>
    <section id="heroInfoView" class="season6-content-section hero-info-section">
      <div class="team-section-head">
        <span>SEASON 6</span>
        <h2 id="heroInfoTitle">S HERO INFORMATION</h2>
        <p id="heroInfoLead"></p>
      </div>
      <div id="heroCards" class="hero-cards" role="tablist" aria-label="Season 6 heroes"></div>
      <article id="heroDetail" class="hero-detail" aria-live="polite"></article>
      <section class="hero-quick-guide" aria-labelledby="heroQuickTitle">
        <h3 id="heroQuickTitle"></h3>
        <p id="heroQuickText"></p>
      </section>
    </section>

    <section id="battleMapView" class="season6-content-section">
      <div class="team-section-head">
        <span>SEASON 6</span>
        <h2 id="battleMapTitle">BATTLEFIELD MAP</h2>
        <p id="battleMapLead"></p>
      </div>
      <div class="frame seasonframe battle-map-frame" aria-labelledby="battleMapTitle"><div class="stage"><img id="seasonBattleMapImg" src="./season6-battlefield-map.webp?v=1610" alt="Season 6 battlefield map"></div></div>
      <p class="hint" data-k="pinch"></p>
    </section>
    <section id="teamsView" class="season6-content-section">
      <div class="team-section-head">
        <span id="teamEyebrow">SEASON 6</span>
        <h2 id="teamAssignmentTitle">TEAM ASSIGNMENT</h2>
        <p id="teamAssignmentLead"></p>
        <small id="teamUpdated" hidden></small>
      </div>
      <div id="teamCards" class="team-cards"></div>
    </section>
    <section id="teamStrategyView" class="season6-content-section">
      <div class="team-section-head">
        <span>SEASON 6</span>
        <h2 id="teamStrategyTitle">TEAM STRATEGY</h2>
        <p id="teamStrategyLead"></p>
      </div>
      <section id="strategyPanel" class="strategy-panel strategy-panel--attack" aria-labelledby="teamStrategyTitle">
        <div class="strategy-tabs" role="tablist" aria-label="Team strategy">
          <button class="strategy-tab strategy-tab--attack is-active" type="button" role="tab" aria-selected="true" aria-controls="strategyContent" data-strategy-team="attack"></button>
          <button class="strategy-tab strategy-tab--defense" type="button" role="tab" aria-selected="false" aria-controls="strategyContent" data-strategy-team="defense"></button>
          <button class="strategy-tab strategy-tab--support" type="button" role="tab" aria-selected="false" aria-controls="strategyContent" data-strategy-team="support"></button>
        </div>
        <div id="strategyContent" class="strategy-content" role="tabpanel">
          <div id="strategyIcon" class="strategy-content-icon" aria-hidden="true"></div>
          <h3 id="strategyContentTitle"></h3>
          <p id="strategyComingSoon"></p>
        </div>
      </section>
    </section>

    <section id="commonOrdersView" class="season6-content-section">
      <div class="team-section-head">
        <span>SEASON 6</span>
        <h2 id="commonOrdersTitle">COMMON ORDERS</h2>
        <p id="commonOrdersLead"></p>
      </div>
      <section class="common-orders-panel" aria-labelledby="commonOrdersTitle">
        <div class="common-orders-icon" aria-hidden="true">✦</div>
        <h3 id="commonOrdersBoxTitle"></h3>
        <p id="commonOrdersComingSoon"></p>
      </section>
    </section>
  </section>
  </div>
</main>
<footer><b>322 EZPK ALLIANCE</b><span data-k="footer"></span></footer>

<div id="teamImageModal" class="team-image-modal" hidden>
  <div class="team-image-backdrop" data-team-close></div>
  <section class="team-image-panel" role="dialog" aria-modal="true" aria-labelledby="teamImageTitle">
    <div class="team-image-head">
      <div><span>SERVER 322 · EZPK</span><h2 id="teamImageTitle"></h2></div>
      <button id="teamImageClose" type="button" aria-label="Close">×</button>
    </div>
    <div class="team-image-guide">
      <strong id="teamImageGuideTitle"></strong>
      <p id="teamImageGuideMobile"></p>
      <p id="teamImageGuidePc"></p>
    </div>
    <div class="team-image-wrap"><img id="teamImagePreview" alt="Season 6 team image preview"></div>
    <div class="team-image-actions">
      <button id="teamImageDone" class="team-close-btn" type="button"></button>
    </div>
  </section>
</div>

<script src="../data.js?v=1610"></script>
<script src="season6.js?v=1740"></script>
</body>
</html>
