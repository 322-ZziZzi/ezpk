<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
  <meta name="theme-color" content="#05070b">
  <title>Season 7 | 322 EZPK Alliance</title>
  <link rel="stylesheet" href="../style.css?v=1010">
  <link rel="stylesheet" href="season7.css?v=1060">
  <link rel="stylesheet" href="../common-heading.css?v=1020">
</head>
<body>
<header class="site-header" data-shared-header data-base=".." data-home-href="../#home" data-active-menu="season7"></header>
<script src="../shared-header.js?v=981"></script>
<main>
  <section class="season7-page">
    <section id="latestView" class="season7-content-section">
      <div class="section-title-block">
        <span>SEASON 7</span>
        <h2 id="latestInfoTitle">LATEST INFO</h2>
        <p id="latestInfoLead"></p>
      </div>
      <div class="frame seasonframe"><div class="stage"><img id="season7Img" alt="Season 7 latest information"></div></div>
      <p class="hint" data-k="pinch"></p>
    </section>
    <section id="teamsView" class="season7-content-section">
      <div class="team-section-head">
        <span id="teamEyebrow">SEASON 7</span>
        <h2 id="teamAssignmentTitle">TEAM ASSIGNMENT</h2>
        <p id="teamAssignmentLead"></p>
        <small id="teamUpdated" hidden></small>
      </div>
      <div id="teamCards" class="team-cards"></div>
    </section>
    <section id="teamStrategyView" class="season7-content-section">
      <div class="team-section-head">
        <span>SEASON 7</span>
        <h2 id="teamStrategyTitle">TEAM STRATEGY</h2>
        <p id="teamStrategyLead"></p>
      </div>
      <section id="strategyPanel" class="strategy-panel strategy-panel--attack" aria-labelledby="teamStrategyTitle">
        <div class="strategy-tabs" role="tablist" aria-label="Team strategy">
          <button class="strategy-tab strategy-tab--attack is-active" type="button" role="tab" aria-selected="true" aria-controls="strategyContent" data-strategy-team="attack"></button>
          <button class="strategy-tab strategy-tab--defense" type="button" role="tab" aria-selected="false" aria-controls="strategyContent" data-strategy-team="defense"></button>
          <button class="strategy-tab strategy-tab--support" type="button" role="tab" aria-selected="false" aria-controls="strategyContent" data-strategy-team="support"></button>
        </div>
        <div id="strategyContent" class="strategy-content" role="tabpanel">
          <div id="strategyIcon" class="strategy-content-icon" aria-hidden="true"></div>
          <h3 id="strategyContentTitle"></h3>
          <p id="strategyComingSoon"></p>
        </div>
      </section>
    </section>

    <section id="commonOrdersView" class="season7-content-section">
      <div class="team-section-head">
        <span>SEASON 7</span>
        <h2 id="commonOrdersTitle">COMMON ORDERS</h2>
        <p id="commonOrdersLead"></p>
      </div>
      <section class="common-orders-panel" aria-labelledby="commonOrdersTitle">
        <div class="common-orders-icon" aria-hidden="true">✦</div>
        <h3 id="commonOrdersBoxTitle"></h3>
        <p id="commonOrdersComingSoon"></p>
      </section>
    </section>
  </section>
</main>
<footer><b>322 EZPK ALLIANCE</b><span data-k="footer"></span></footer>

<div id="teamImageModal" class="team-image-modal" hidden>
  <div class="team-image-backdrop" data-team-close></div>
  <section class="team-image-panel" role="dialog" aria-modal="true" aria-labelledby="teamImageTitle">
    <div class="team-image-head">
      <div><span>SERVER 322 · EZPK</span><h2 id="teamImageTitle"></h2></div>
      <button id="teamImageClose" type="button" aria-label="Close">×</button>
    </div>
    <div class="team-image-guide">
      <strong id="teamImageGuideTitle"></strong>
      <p id="teamImageGuideMobile"></p>
      <p id="teamImageGuidePc"></p>
    </div>
    <div class="team-image-wrap"><img id="teamImagePreview" alt="Season 7 team image preview"></div>
    <div class="team-image-actions">
      <button id="teamImageDone" class="team-close-btn" type="button"></button>
    </div>
  </section>
</div>

<script src="../data.js?v=1010"></script>
<script src="season7.js?v=1060"></script>
</body>
</html>
