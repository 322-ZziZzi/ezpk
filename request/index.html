<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes"><meta name="theme-color" content="#05070b">
<title>EZPK Request Board</title>
<link rel="stylesheet" href="../style.css?v=1760"><link rel="stylesheet" href="request.css?v=870">
  <link rel="stylesheet" href="../common-heading.css?v=1020">
</head>
<body>
<header class="site-header" data-shared-header data-base=".." data-home-href="../#home" data-active-menu="request"></header><script src="../shared-header.js?v=1530"></script>
<main class="request-main">
<section id="requestLock" class="member-gate-wrap">
  <div class="member-gate-card">
    <div class="member-gate-icon" aria-hidden="true">🔒</div>
    <span id="requestLockSection" class="member-gate-section"></span>
    <h1 id="requestLockTitle" class="member-gate-title"></h1>
    <p id="requestLockLead" class="member-gate-description"></p>
    <form id="requestLockForm" class="member-gate-form">
      <label for="alliancePassword" id="alliancePasswordLabel"></label>
      <div class="member-gate-row">
        <input id="alliancePassword" type="password" autocomplete="current-password" required>
        <button id="requestUnlockBtn" type="submit"></button>
      </div>
      <p id="requestLockError" class="member-gate-error" role="alert"></p>
    </form>
  </div>
</section>
<div id="requestProtected" hidden>
    <div class="alliance-logout-row" data-alliance-logout-row hidden>
      <button type="button" class="alliance-logout-btn" data-alliance-logout></button>
    </div>
<section class="request-hero"><span class="eyebrow">SERVER 322 · EZPK ALLIANCE</span><h1 id="requestTitle"></h1><p id="requestLead"></p></section>
<section class="request-layout">
  <div class="request-left-column">
  <form id="requestForm" class="request-form" autocomplete="off">
    <div class="request-form-head"><span id="newRequestLabel"></span><h2 id="writeTitle"></h2></div>
    <label><span id="nicknameLabel"></span><input id="requestNickname" maxlength="30" required></label>
    <label><span id="passwordLabel"></span><input id="requestPassword" type="password" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" required></label>
    <label><span id="messageLabel"></span><textarea id="requestMessage" maxlength="1000" rows="7" required></textarea></label>
    <div class="request-counter"><span id="passwordHelp"></span><strong id="messageCount">0 / 1000</strong></div>
    <button id="requestSubmit" type="submit" class="request-submit"></button>
    <div id="requestFormStatus" class="request-status" aria-live="polite"></div>
  </form>
  <form id="ownDeleteForm" class="own-delete-form" autocomplete="off">
    <h3 id="ownDeleteTitle"></h3>
    <p id="ownDeleteHelp"></p>
    <label><span id="ownDeleteIdLabel"></span><input id="ownDeleteId" type="number" min="1" inputmode="numeric" required placeholder="#25"></label>
    <label><span id="ownDeletePasswordLabel"></span><input id="ownDeletePassword" type="password" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" required placeholder="••••"></label>
    <button id="ownDeleteSubmit" type="submit" class="own-delete-submit"></button>
    <div id="ownDeleteStatus" class="request-status" aria-live="polite"></div>
  </form>
  </div>
  <section class="request-list-card"><div class="request-list-head"><div><span id="recentLabel"></span><h2 id="recentTitle"></h2></div><button id="requestRefresh" type="button">↻</button></div><div id="requestList" class="request-list"></div><button id="requestMore" type="button" class="request-more" hidden></button></section>
</section>
</div>
</main>
<footer><b>322 EZPK ALLIANCE</b><span id="footerText"></span></footer>
<script src="../data.js?v=1530"></script><script src="../supabase-config.js?v=1530"></script><script src="request.js?v=1760"></script>
</body></html>
