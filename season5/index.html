<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
  <meta name="theme-color" content="#05070b">
  <title>EZPK Season 5 Records</title>
  <link rel="stylesheet" href="../style.css?v=1480">
  <link rel="stylesheet" href="season5.css?v=1080">
  <link rel="stylesheet" href="../common-heading.css?v=1020">
</head>
<body>
<header class="site-header" data-shared-header data-base=".." data-home-href="../#home" data-active-menu="seasonArchive"></header><script src="../shared-header.js?v=1480"></script>

<main class="season-record-page">
  <section class="record-hero">
    <span class="eyebrow">SEASON 5 · ARCHIVE</span>
    <h1 data-record-k="recordTitle"></h1>
    <p data-record-k="recordLead"></p>
  </section>

  <section class="record-section" aria-label="Season 5 records">
    <div class="record-grid">
      <figure><img src="assets/S6_00.webp" alt="Season 5 record 0" loading="eager"></figure>
      <figure><img src="assets/S6_01.webp" alt="Season 5 record 1" loading="eager"></figure>
      <figure><img src="assets/S6_02.webp" alt="Season 5 record 2" loading="lazy"></figure>
      <figure><img src="assets/S6_03.webp" alt="Season 5 record 3" loading="lazy"></figure>
      <figure><img src="assets/S6_04.webp" alt="Season 5 record 4" loading="lazy"></figure>
      <figure><img src="assets/S6_05.webp" alt="Season 5 record 5" loading="lazy"></figure>
      <figure><img src="assets/S6_06.webp" alt="Season 5 record 6" loading="lazy"></figure>
      <figure><img src="assets/S6_07.webp" alt="Season 5 record 7" loading="lazy"></figure>
      <figure><img src="assets/S6_08.webp" alt="Season 5 record 8" loading="lazy"></figure>
      <figure><img src="assets/S6_09.webp" alt="Season 5 record 9" loading="lazy"></figure>
      <figure><img src="assets/S6_10.webp" alt="Season 5 record 10" loading="lazy"></figure>
      <figure><img src="assets/S6_11.webp" alt="Season 5 record 11" loading="lazy"></figure>
    </div>
  </section>

  <section class="season-finale">
    <span class="finale-line" aria-hidden="true"></span>
    <h2>Season 5 — The Battle Is Over</h2>
    <div class="finale-message" data-record-k="finaleMessage"></div>
  </section>
</main>

<footer><b>322 EZPK ALLIANCE</b><span data-k="footer"></span></footer>
<script src="../data.js?v=1080"></script>
<script src="season5.js?v=1080"></script>
</body>
</html>
