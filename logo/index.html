<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
  <meta name="theme-color" content="#05070b">
  <title>EZPK Logo | 322 EZPK Alliance</title>
  <link rel="stylesheet" href="../style.css?v=1700">
  <link rel="stylesheet" href="logo.css?v=950">
  <link rel="stylesheet" href="../common-heading.css?v=1020">
</head>
<body>
<header class="site-header" data-shared-header data-base=".." data-home-href="../#home" data-active-menu="logo"></header>
<script src="../shared-header.js?v=1530"></script>
<main class="logo-main">
  <section class="logo-hero">
    <span class="logo-kicker">SERVER 322 · EZPK ALLIANCE</span>
    <h1 data-logo-k="title"></h1>
    <p data-logo-k="subtitle"></p>
  </section>

  <section class="logo-gallery-section">
    <div class="download-guide" role="note">
      <strong data-logo-k="guideTitle"></strong>
      <p data-logo-k="guideBody"></p>
      <div class="guide-methods">
        <span data-logo-k="mobileGuide"></span>
        <span data-logo-k="pcGuide"></span>
      </div>
    </div>

    <div class="logo-grid">
      <article class="logo-card">
        <button class="logo-image-button" type="button" data-logo-open="Legacy Edition.webp" data-edition="Legacy Edition" aria-label="Open Legacy Edition image">
          <img src="./Legacy Edition.webp?v=950" alt="EZPK Legacy Edition emblem">
        </button>
        <h2>Legacy Edition</h2>
        <p data-logo-k="legacyDescription"></p>
        <button class="logo-open-btn" type="button" data-logo-open="Legacy Edition.webp" data-edition="Legacy Edition" data-logo-k="openImage"></button>
      </article>

      <article class="logo-card">
        <button class="logo-image-button" type="button" data-logo-open="Royal Edition.webp" data-edition="Royal Edition" aria-label="Open Royal Edition image">
          <img src="./Royal Edition.webp?v=950" alt="EZPK Royal Edition emblem">
        </button>
        <h2>Royal Edition</h2>
        <p data-logo-k="royalDescription"></p>
        <button class="logo-open-btn" type="button" data-logo-open="Royal Edition.webp" data-edition="Royal Edition" data-logo-k="openImage"></button>
      </article>
    </div>
  </section>
</main>

<footer><b>322 EZPK ALLIANCE</b><span data-logo-k="footer"></span></footer>

<div id="logoPreviewModal" class="logo-preview-modal" hidden>
  <div class="logo-preview-backdrop" data-logo-close></div>
  <section class="logo-preview-panel" role="dialog" aria-modal="true" aria-labelledby="logoPreviewTitle">
    <div class="logo-preview-head">
      <div><span>SERVER 322 · EZPK</span><h2 id="logoPreviewTitle"></h2></div>
      <button id="logoPreviewClose" type="button" aria-label="Close">×</button>
    </div>
    <p id="logoPreviewGuide"></p>
    <div class="logo-preview-image-wrap"><img id="logoPreviewImage" alt="EZPK logo preview"></div>
    <button id="logoPreviewDone" class="logo-preview-done" type="button" data-logo-k="close"></button>
  </section>
</div>

<script src="../data.js?v=1530"></script>
<script src="logo.js?v=1530"></script>
</body>
</html>
