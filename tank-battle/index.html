<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover">
  <meta name="theme-color" content="#05070b">
  <title>322 EZPK Tank Battle</title>
  <link rel="stylesheet" href="../style.css?v=670">
  <link rel="stylesheet" href="tank.css?v=670">
  <link rel="stylesheet" href="../game-switcher.css?v=670">
</head>
<body>
<header class="site-header">
  <a href="../" class="brand">★ <span><b>322 EZPK</b><small>ALLIANCE PORTAL</small></span></a>
  <button id="menuBtn" aria-label="Menu">☰</button>
  <nav id="nav"><a href="../" data-k="navHome"></a><a href="../season6/" data-k="navSeason6"></a><a href="../members/" data-k="navMember"></a><a href="../bgb/">BGB</a><a href="../request/" data-k="navRequest"></a><a href="../game/" data-k="navGame" class="active"></a></nav>
  <div class="lang"><button id="langBtn"><span id="flag"></span><span id="lname"></span> ▾</button><div id="langMenu" hidden><button data-l="ko">🇰🇷 한국어</button><button data-l="en">🇺🇸 English</button><button data-l="pt">🇧🇷 Português</button><button data-l="vi">🇻🇳 Tiếng Việt</button><button data-l="ar">🇸🇦 العربية</button><button data-l="ja">🇯🇵 日本語</button><button data-l="zh-tw">🇹🇼 繁體中文</button></div></div>
</header>
<main class="tank-main mini-game-main">
  <section class="tank-hero mini-game-hero"><span class="eyebrow" id="gameEyebrow"></span><h1>TANK BATTLE</h1><p id="gameLead"></p></section>
  <section class="game-library" id="gameLibrary">
    <article class="game-choice active-game"><div class="game-choice-icon">🛡</div><div><span id="survivalStatus"></span><h2>SURVIVAL</h2><p id="survivalDescription"></p></div><a href="../game/#gameShell" id="playSurvivalLink"></a></article>
    <article class="game-choice active-game current-game"><div class="game-choice-icon">💥</div><div><span id="tankStatus"></span><h2>TANK BATTLE</h2><p id="tankDescription"></p></div><span class="current-badge" id="currentGameBadge"></span></article>
    <article class="game-choice active-game missile-game"><div class="game-choice-icon">🚀</div><div><span id="missileAvailable"></span><h2>MISSILE DEFENSE</h2><p id="missileDescription"></p></div><a href="../missile-defense/#gameShell" id="playMissileLink"></a></article>
    <article class="game-choice active-game"><div class="game-choice-icon">🎯</div><div><span id="droneStatus"></span><h2>DRONE HUNTER</h2><p id="droneDescription"></p></div><a href="../drone-hunter/#gameShell" id="playDroneLink"></a></article>
  </section>
  <section class="mobile-game-info"><h2 id="mobileInfoTitle"></h2><p id="mobileInfoText"></p><small id="mobileInfoControl"></small></section>
  <section class="tank-layout">
    <div class="tank-panel">
      <div class="tank-toolbar"><div><span id="scoreLabel"></span><strong id="scoreValue">0</strong></div><div><span id="waveLabel"></span><strong id="waveValue">1</strong></div><div><span id="hpLabel"></span><strong id="hpValue">♥♥♥</strong></div><div><span id="timeLabel"></span><strong id="timeValue">00:00</strong></div><button id="soundBtn" type="button">🔊</button></div>
      <div id="gameShell" class="tank-shell">
        <canvas id="gameCanvas" width="960" height="640" aria-label="EZPK Tank Battle game"></canvas>
        <div id="startOverlay" class="game-overlay"><div class="overlay-card"><div class="tank-emblem">★</div><h2 id="startTitle"></h2><p id="startText"></p><label for="nickname" id="nicknameLabel"></label><input id="nickname" maxlength="16" autocomplete="nickname" spellcheck="false"><button id="startBtn" type="button"></button><small id="controlHelp"></small></div></div>
        <div id="resultOverlay" class="game-overlay" hidden><div class="overlay-card result-card"><span class="result-label" id="resultLabel"></span><strong id="finalScore">0</strong><p id="resultText"></p><div class="result-actions"><button id="retryBtn" type="button"></button><button id="rankingBtn" type="button" class="secondary"></button></div></div></div>
        <div id="postRankingOverlay" class="game-overlay" hidden><div class="overlay-card"><span class="ranking-check-icon">✓</span><p id="rankingCheckedText"></p><button id="replayBtn" type="button"></button></div></div>
      </div>
      <div class="mobile-controls" aria-label="Mobile tank controls">
        <div class="dpad"><button data-dir="up">▲</button><div><button data-dir="left">◀</button><button data-dir="down">▼</button><button data-dir="right">▶</button></div></div>
        <button id="fireBtn" class="fire-btn" type="button"><span>FIRE</span><small>AUTO AIM</small></button>
      </div>
    </div>
    <aside id="ranking" class="ranking-panel"><div class="ranking-head"><div><span>TOP 30</span><h2 id="rankingTitle"></h2></div><button id="refreshRanking" type="button">↻</button></div><div class="month-chip" id="monthChip"></div><div id="rankingStatus" class="ranking-status"></div><ol id="rankingList" class="ranking-list"></ol><p id="rankingNote" class="ranking-note"></p></aside>
  </section>
</main>
<footer><b>322 EZPK ALLIANCE</b><span id="gameFooter"></span></footer>
<script src="../data.js?v=670"></script><script src="../supabase-config.js?v=670"></script><script src="tank.js?v=670"></script>
</body></html>
