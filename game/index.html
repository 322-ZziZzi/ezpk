<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
  <meta name="theme-color" content="#05070b">
  <title>322 EZPK Mini Game</title>
  <link rel="stylesheet" href="../style.css?v=1510">
  <link rel="stylesheet" href="game.css?v=1160">
  <link rel="stylesheet" href="../ranking-panel.css?v=1500">
  <link rel="stylesheet" href="../game-switcher.css?v=1160">
  <link rel="stylesheet" href="../common-heading.css?v=1020">
<link rel="stylesheet" href="../game-viewport.css?v=1350"><link rel="stylesheet" href="../game-start-v148.css?v=1480">
</head>
<body>
<header class="site-header" data-shared-header data-base=".." data-home-href="../#home" data-active-menu="game"></header><script src="../shared-header.js?v=1510"></script>
<main class="game-main mini-game-main">
  <section class="game-hero mini-game-hero">
    <span class="eyebrow" id="gameEyebrow"></span>
    <h1 id="gameTitle">EZPK SURVIVAL</h1>
    <p id="gameLead"></p>
  </section>
  <section class="game-library" id="gameLibrary" aria-label="EZPK mini games">
    <article class="game-choice active-game current-game">
      <div class="game-choice-icon">🛡</div>
      <div><span id="availableNow"></span><h2>SURVIVAL</h2><p id="survivalDescription"></p></div>
      <span class="current-badge" id="currentGameBadge"></span>
    </article>
    <article class="game-choice active-game tank-game"><div class="game-choice-icon">💥</div><div><span id="tankAvailable"></span><h2>TANK BATTLE</h2><p id="tankDescription"></p></div><a href="../tank-battle/#gameShell" id="playTankLink"></a></article>
    <article class="game-choice active-game missile-game"><div class="game-choice-icon">🚀</div><div><span id="missileAvailable"></span><h2>MISSILE DEFENSE</h2><p id="missileDescription"></p></div><a href="../missile-defense/#gameShell" id="playMissileLink"></a></article>
    <article class="game-choice active-game drone-game"><div class="game-choice-icon">🎯</div><div><span id="droneAvailable"></span><h2>DRONE HUNTER</h2><p id="droneDescription"></p></div><a href="../drone-hunter/#gameShell" id="playDroneLink"></a></article>
  </section>
  <section class="mobile-game-info" id="mobileGameInfo" aria-live="polite">
    <h2 id="mobileInfoTitle"></h2>
    <p id="mobileInfoText"></p>
    <small id="mobileInfoControl"></small>
  </section>
  <section class="game-layout">
    <div class="game-panel">
      <div class="game-toolbar"><div><span id="scoreLabel"></span><strong id="scoreValue">0</strong></div><div><span id="timeLabel"></span><strong id="timeValue">00:00.0</strong></div><button id="soundBtn" type="button" aria-label="Sound">🔊</button></div>
      <div id="gameShell" class="game-shell">
        <canvas id="gameCanvas" width="760" height="760" aria-label="EZPK Survival game"></canvas>
        <div id="startOverlay" class="game-overlay">
          <div class="overlay-card">
            <div class="tank-mark" aria-hidden="true"><span>EZPK</span></div>
            <h2 id="startTitle"></h2><p id="startText"></p>
            <label for="nickname" id="nicknameLabel"></label>
            <input id="nickname" maxlength="16" autocomplete="nickname" spellcheck="false">
            <button id="startBtn" type="button"></button>
            <small id="controlHelp"></small>
          </div>
        </div>
        <div id="resultOverlay" class="game-overlay" hidden>
          <div class="overlay-card result-card"><span class="result-label" id="resultLabel"></span><strong id="finalScore">0</strong><p id="resultText"></p><div class="result-actions"><button id="retryBtn" type="button"></button><button id="rankingBtn" type="button" class="secondary"></button></div></div>
        </div>
        <div id="postRankingOverlay" class="game-overlay post-ranking-overlay" hidden>
          <div class="overlay-card post-ranking-card">
            <span class="ranking-check-icon" aria-hidden="true">✓</span>
            <p id="rankingCheckedText"></p>
            <button id="replayBtn" type="button"></button>
          </div>
        </div>
      </div>
      <div class="mobile-pad" aria-label="Mobile controls"><button data-dir="up">▲</button><div><button data-dir="left">◀</button><button data-dir="down">▼</button><button data-dir="right">▶</button></div></div>
    </div>
    <aside id="ranking" class="ranking-panel" data-ranking-panel></aside>
  </section>
</main>
<footer><b>322 EZPK ALLIANCE</b><span id="gameFooter"></span></footer>
<script src="../game-switcher-extra.js?v=1430"></script><script src="../data.js?v=1160"></script><script src="../supabase-config.js?v=1160"></script><script src="../ranking-panel.js?v=1500"></script><script src="../game-viewport.js?v=1350"></script><script src="game.js?v=1490"></script>
</body>
</html>
